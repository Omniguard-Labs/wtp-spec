name: Spec change proposal
description: Propose a normative or editorial spec change.
title: "[Spec]: "
labels: ["spec"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Compatibility impact
      description: Does this change wire format or verifier behavior?
    validations:
      required: true
