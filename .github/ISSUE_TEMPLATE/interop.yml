name: Interoperability issue
description: Report a decoding, verification, or test vector mismatch.
title: "[Interop]: "
labels: ["interop"]
body:
  - type: dropdown
    id: profile
    attributes:
      label: Profile
      options:
        - EVM
        - Solana
        - Trust metadata
        - Transport
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
